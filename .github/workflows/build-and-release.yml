name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      - name: Resolve release tag
        id: tag
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag.StartsWith("v")) {
            Write-Error "Expected a v* tag, got: $tag"
            exit 1
          }

          Write-Host "Building release for tag: $tag"
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Download dependencies
        run: go mod tidy

      - name: Create dist directory
        run: |
          if (-not (Test-Path "dist")) {
            New-Item -ItemType Directory -Path "dist"
          }

      - name: Build executable
        id: build_executable
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          $exeName = "UE-Git-Plugin-Manager-$tag.exe"
          $exePath = "dist/$exeName"

          Write-Host "Building $exeName..."
          go build -o $exePath .

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Build failed"
            exit 1
          }

          "exe_name=$exeName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "exe_path=$exePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Verify executable
        run: |
          $exePath = "${{ steps.build_executable.outputs.exe_path }}"
          if (-not (Test-Path $exePath)) {
            Write-Error "Executable not found: $exePath"
            exit 1
          }

          $fileSize = (Get-Item $exePath).Length
          Write-Host "Executable created: $exePath"
          Write-Host "Size: $fileSize bytes"

      - name: Create GitHub release
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          $exePath = "${{ steps.build_executable.outputs.exe_path }}"

          gh release create $tag $exePath --title "Release $tag" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
